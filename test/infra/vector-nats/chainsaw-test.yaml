# Chainsaw E2E Test: Audit Log Pipeline Verification
#
# This test verifies the audit logging pipeline:
#   1. Trigger a real Kubernetes API action to generate an audit log entry
#   2. Vector reads the audit log file and pushes events to NATS
#   3. Verify the event exists in NATS JetStream queue
#
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: audit-log-pipeline
spec:
  description: |
    Verifies that audit events from the kube-apiserver audit log file are
    correctly forwarded to the NATS AUDIT_EVENTS stream by Vector.
    Triggers a real Kubernetes API action and verifies its audit event arrives.

  # Use existing namespace to avoid ephemeral namespace creation/deletion
  namespace: default

  steps:
    - name: inject-and-verify
      try:
        - script:
            timeout: 2m
            content: |
              echo "--------------------------------------------------"
              echo "1. Capturing baseline NATS stream sequence"
              echo "--------------------------------------------------"

              BASELINE_SEQ=$(kubectl exec -n nats-system deployment/nats-box -- nats stream info AUDIT_EVENTS --json | grep '"last_seq"' | awk '{print $2}' | tr -d ',')
              echo "Baseline Last Sequence ID: $BASELINE_SEQ"

              echo ""
              echo "--------------------------------------------------"
              echo "2. Triggering Kubernetes API action to generate audit event"
              echo "--------------------------------------------------"

              # Create a unique ConfigMap - this generates a deterministic audit event
              # with a name we can search for in NATS
              CM_NAME="audit-test-$(date +%s)"
              echo "Creating ConfigMap: $CM_NAME"
              kubectl create configmap "$CM_NAME" --from-literal=test=value -n default

              echo ""
              echo "--------------------------------------------------"
              echo "3. Waiting for Vector to pick up and forward the event"
              echo "--------------------------------------------------"

              # Vector reads from file - give it time to tail, parse, and publish
              sleep 10

              echo ""
              echo "--------------------------------------------------"
              echo "4. Verifying event in NATS"
              echo "--------------------------------------------------"

              NEW_SEQ=$(kubectl exec -n nats-system deployment/nats-box -- nats stream info AUDIT_EVENTS --json | grep '"last_seq"' | awk '{print $2}' | tr -d ',')
              echo "New Last Sequence ID: $NEW_SEQ"

              if [ "$NEW_SEQ" = "$BASELINE_SEQ" ]; then
                echo "❌ No new messages arrived in NATS after triggering API action."
                exit 1
              fi

              echo "New messages arrived (seq $BASELINE_SEQ -> $NEW_SEQ). Searching for our event..."

              # Search the new messages for our ConfigMap name
              START_SEQ=$((BASELINE_SEQ + 1))
              FOUND=0

              for seq in $(seq $START_SEQ $NEW_SEQ); do
                MSG=$(kubectl exec -n nats-system deployment/nats-box -- nats stream get AUDIT_EVENTS "$seq" 2>&1 || true)
                if echo "$MSG" | grep -q "$CM_NAME"; then
                  echo "✅ Found audit event for $CM_NAME at sequence $seq"
                  FOUND=1
                  break
                fi
              done

              if [ "$FOUND" -eq 0 ]; then
                echo "❌ Audit event for $CM_NAME not found in NATS (seq $START_SEQ to $NEW_SEQ)."
                echo "This may indicate Vector has not yet tailed the file or the pipeline is broken."
                exit 1
              fi

              echo "✅ Audit log pipeline verified successfully."

              # Cleanup
              kubectl delete configmap "$CM_NAME" -n default --ignore-not-found=true

  # Increase timeouts to avoid Context Deadline Exceeded during cleanup
  timeouts:
    cleanup: 2m
    delete: 2m