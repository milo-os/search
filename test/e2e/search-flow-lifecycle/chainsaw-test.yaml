apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: search-flow-lifecycle
spec:
  description: |
    End-to-end tests for search pagination and multi-resource indexing using the
    ResourceSearchQuery API. Targets Endpoints to avoid ResourceIndexPolicy conflicts
    with parallel test suites. Covers: pagination (limit enforced, continue token
    present when more results exist), and multiple independently-indexed resources
    each searchable by their own unique annotation value.

  namespace: default

  steps:
    # =========================================================================
    # Pre-cleanup: remove any leftover resources for idempotent runs
    # =========================================================================
    - name: pre-cleanup
      description: "Removes leftover resources to ensure idempotent test execution"
      try:
        - script:
            timeout: 30s
            content: |
              kubectl delete resourceindexpolicy e2e-lifecycle-ep-policy --ignore-not-found=true || true
              kubectl delete endpoints \
                e2e-ep-web \
                e2e-ep-api \
                e2e-ep-worker \
                e2e-page-ep-alpha \
                e2e-page-ep-beta \
                e2e-page-ep-gamma \
                -n default --ignore-not-found=true || true
              sleep 3
            check:
              ($error): ~

    # =========================================================================
    # Setup: policy for Endpoints
    # =========================================================================
    - name: create-ep-policy
      description: "Creates ResourceIndexPolicy targeting Endpoints with e2e-ep-test label"
      try:
        - apply:
            resource:
              apiVersion: search.miloapis.com/v1alpha1
              kind: ResourceIndexPolicy
              metadata:
                name: e2e-lifecycle-ep-policy
              spec:
                targetResource:
                  group: ""
                  version: v1
                  kind: Endpoints
                conditions:
                  - name: is-e2e-ep-test
                    expression: "'e2e-ep-test' in metadata.labels"
                fields:
                  - path: ".metadata.name"
                    searchable: true
                  - path: ".metadata.annotations['e2e.search.test/role']"
                    searchable: true
                  - path: ".metadata.annotations['e2e.search.test/page-tag']"
                    searchable: true

    - name: wait-for-ep-policy-ready
      description: "Waits for Endpoints policy to reach Ready=True"
      try:
        - wait:
            apiVersion: search.miloapis.com/v1alpha1
            kind: ResourceIndexPolicy
            name: e2e-lifecycle-ep-policy
            timeout: 60s
            for:
              condition:
                name: Ready
                value: "True"

    # =========================================================================
    # SCENARIO D: Multiple independently-indexed resources
    # Create 3 Endpoints with unique annotation values. Verify each is
    # searchable by its own value and NOT returned when searching another's.
    # =========================================================================
    - name: D-create-endpoints
      description: "Creates three Endpoints with unique role annotations"
      try:
        - script:
            timeout: 15s
            content: |
              cat <<EOF | kubectl apply -f -
              apiVersion: v1
              kind: Endpoints
              metadata:
                name: e2e-ep-web
                namespace: default
                labels:
                  e2e-ep-test: "true"
                annotations:
                  e2e.search.test/role: "frontend-webserver-xz9"
              EOF
            check:
              ($error): ~
        - script:
            timeout: 15s
            content: |
              cat <<EOF | kubectl apply -f -
              apiVersion: v1
              kind: Endpoints
              metadata:
                name: e2e-ep-api
                namespace: default
                labels:
                  e2e-ep-test: "true"
                annotations:
                  e2e.search.test/role: "backend-apigateway-xz9"
              EOF
            check:
              ($error): ~
        - script:
            timeout: 15s
            content: |
              cat <<EOF | kubectl apply -f -
              apiVersion: v1
              kind: Endpoints
              metadata:
                name: e2e-ep-worker
                namespace: default
                labels:
                  e2e-ep-test: "true"
                annotations:
                  e2e.search.test/role: "async-jobworker-xz9"
              EOF
            check:
              ($error): ~

    - name: D-wait-for-indexing
      description: "Waits 15 seconds for all Endpoints to be indexed"
      try:
        - script:
            timeout: 20s
            content: sleep 15
            check:
              ($error): ~

    - name: D1-search-web-found
      description: "D1: Search by web Endpoint annotation — must find only web"
      try:
        - script:
            timeout: 30s
            content: |
              RESULT=$(cat <<EOF | kubectl create -f - -o json
              apiVersion: search.miloapis.com/v1alpha1
              kind: ResourceSearchQuery
              metadata:
                name: d1-search-web
              spec:
                targetResources:
                  - group: ""
                    version: v1
                    kind: Endpoints
                query: "frontend-webserver-xz9"
                limit: 10
              EOF
              )
              echo "$RESULT" | jq -e '[.status.results[]? | select(.resource.metadata.name == "e2e-ep-web")] | length > 0' && \
              echo "$RESULT" | jq -e '[.status.results[]? | select(.resource.metadata.name == "e2e-ep-api")] | length == 0'
            check:
              ($error): ~

    - name: D2-search-api-found
      description: "D2: Search by API Endpoint annotation — must find only API"
      try:
        - script:
            timeout: 30s
            content: |
              RESULT=$(cat <<EOF | kubectl create -f - -o json
              apiVersion: search.miloapis.com/v1alpha1
              kind: ResourceSearchQuery
              metadata:
                name: d2-search-api
              spec:
                targetResources:
                  - group: ""
                    version: v1
                    kind: Endpoints
                query: "backend-apigateway-xz9"
                limit: 10
              EOF
              )
              echo "$RESULT" | jq -e '[.status.results[]? | select(.resource.metadata.name == "e2e-ep-api")] | length > 0' && \
              echo "$RESULT" | jq -e '[.status.results[]? | select(.resource.metadata.name == "e2e-ep-worker")] | length == 0'
            check:
              ($error): ~

    - name: D3-search-worker-found
      description: "D3: Search by worker Endpoint annotation — must find only worker"
      try:
        - script:
            timeout: 30s
            content: |
              RESULT=$(cat <<EOF | kubectl create -f - -o json
              apiVersion: search.miloapis.com/v1alpha1
              kind: ResourceSearchQuery
              metadata:
                name: d3-search-worker
              spec:
                targetResources:
                  - group: ""
                    version: v1
                    kind: Endpoints
                query: "async-jobworker-xz9"
                limit: 10
              EOF
              )
              echo "$RESULT" | jq -e '[.status.results[]? | select(.resource.metadata.name == "e2e-ep-worker")] | length > 0' && \
              echo "$RESULT" | jq -e '[.status.results[]? | select(.resource.metadata.name == "e2e-ep-web")] | length == 0'
            check:
              ($error): ~

    - name: D4-search-nonexistent-empty
      description: "D4: Search for a term that matches no Endpoint — must return empty"
      try:
        - script:
            timeout: 30s
            content: |
              RESULT=$(cat <<EOF | kubectl create -f - -o json
              apiVersion: search.miloapis.com/v1alpha1
              kind: ResourceSearchQuery
              metadata:
                name: d4-search-empty
              spec:
                targetResources:
                  - group: ""
                    version: v1
                    kind: Endpoints
                query: "nonexistent-role-zzz999"
                limit: 10
              EOF
              )
              echo "$RESULT" | jq -e '(.status.results // []) | length == 0'
            check:
              ($error): ~

    # =========================================================================
    # SCENARIO E: Delete removes entry from index
    # Delete the web Endpoint (already confirmed indexed in D1), wait for the
    # delete event to propagate, then verify it no longer appears in results.
    # =========================================================================
    - name: E-delete-web-endpoint
      description: "Deletes the web Endpoint to test removal from index"
      try:
        - script:
            timeout: 15s
            content: |
              kubectl delete endpoints e2e-ep-web -n default
            check:
              ($error): ~

    - name: E-wait-for-deletion-propagation
      description: "Waits 30 seconds for the delete event to propagate through the indexer"
      try:
        - script:
            timeout: 35s
            content: sleep 30
            check:
              ($error): ~

    - name: E1-search-deleted-not-found
      description: "E1: Deleted web Endpoint must not appear in search results"
      try:
        - script:
            timeout: 30s
            content: |
              RESULT=$(cat <<EOF | kubectl create -f - -o json
              apiVersion: search.miloapis.com/v1alpha1
              kind: ResourceSearchQuery
              metadata:
                name: e1-search-deleted
              spec:
                targetResources:
                  - group: ""
                    version: v1
                    kind: Endpoints
                query: "frontend-webserver-xz9"
                limit: 10
              EOF
              )
              echo "$RESULT" | jq -e '[.status.results[]? | select(.resource.metadata.name == "e2e-ep-web")] | length == 0'
            check:
              ($error): ~

    - name: E2-search-others-still-found
      description: "E2: Non-deleted Endpoints must still be searchable after the deletion"
      try:
        - script:
            timeout: 30s
            content: |
              RESULT=$(cat <<EOF | kubectl create -f - -o json
              apiVersion: search.miloapis.com/v1alpha1
              kind: ResourceSearchQuery
              metadata:
                name: e2-search-api-still
              spec:
                targetResources:
                  - group: ""
                    version: v1
                    kind: Endpoints
                query: "backend-apigateway-xz9"
                limit: 10
              EOF
              )
              echo "$RESULT" | jq -e '[.status.results[]? | select(.resource.metadata.name == "e2e-ep-api")] | length > 0'
            check:
              ($error): ~

    # =========================================================================
    # SCENARIO F: Pagination — limit enforced, continue token present
    # Create 3 Endpoints sharing a unique annotation value. Verify limit=1
    # returns exactly 1 result with a continue token, and limit=10 returns all 3.
    # =========================================================================
    - name: F-create-endpoints
      description: "Creates three Endpoints all sharing a unique page-tag annotation"
      try:
        - script:
            timeout: 15s
            content: |
              for NAME in e2e-page-ep-alpha e2e-page-ep-beta e2e-page-ep-gamma; do
                cat <<EOF | kubectl apply -f -
              apiVersion: v1
              kind: Endpoints
              metadata:
                name: $NAME
                namespace: default
                labels:
                  e2e-ep-test: "true"
                annotations:
                  e2e.search.test/page-tag: "e2e-pagination-shared-tag-xq7"
              EOF
              done
            check:
              ($error): ~

    - name: F-wait-for-indexing
      description: "Waits 30 seconds for all three Endpoints to be indexed"
      try:
        - script:
            timeout: 35s
            content: sleep 30
            check:
              ($error): ~

    - name: F1-search-limit1-returns-one-with-continue
      description: "F1: limit=1 must return exactly 1 result and a non-empty continue token"
      try:
        - script:
            timeout: 30s
            content: |
              RESULT=$(cat <<EOF | kubectl create -f - -o json
              apiVersion: search.miloapis.com/v1alpha1
              kind: ResourceSearchQuery
              metadata:
                name: f1-limit1
              spec:
                targetResources:
                  - group: ""
                    version: v1
                    kind: Endpoints
                query: "e2e-pagination-shared-tag-xq7"
                limit: 1
              EOF
              )
              echo "$RESULT" | jq -e '.status.results | length == 1' && \
              echo "$RESULT" | jq -e '.status.continue | . != null and . != ""'
            check:
              ($error): ~

    - name: F2-search-limit10-returns-all
      description: "F2: limit=10 must return all three pagination Endpoints"
      try:
        - script:
            timeout: 30s
            content: |
              RESULT=$(cat <<EOF | kubectl create -f - -o json
              apiVersion: search.miloapis.com/v1alpha1
              kind: ResourceSearchQuery
              metadata:
                name: f2-limit10
              spec:
                targetResources:
                  - group: ""
                    version: v1
                    kind: Endpoints
                query: "e2e-pagination-shared-tag-xq7"
                limit: 10
              EOF
              )
              echo "$RESULT" | jq -e '[.status.results[]? | select(.resource.metadata.name == "e2e-page-ep-alpha" or .resource.metadata.name == "e2e-page-ep-beta" or .resource.metadata.name == "e2e-page-ep-gamma")] | length == 3'
            check:
              ($error): ~

    # =========================================================================
    # Cleanup
    # =========================================================================
    - name: cleanup
      description: "Removes all resources created by this test suite"
      try:
        - script:
            timeout: 60s
            content: |
              kubectl delete resourceindexpolicy e2e-lifecycle-ep-policy --ignore-not-found=true || true
              kubectl delete endpoints \
                e2e-ep-web \
                e2e-ep-api \
                e2e-ep-worker \
                e2e-page-ep-alpha \
                e2e-page-ep-beta \
                e2e-page-ep-gamma \
                -n default --ignore-not-found=true || true
            check:
              ($error): ~
