apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: searchable-attributes-wildcards
spec:
  description: |
    Verifies that `[*]` array-traversal syntax in ResourceIndexPolicy.spec.fields[].path
    makes every element of an array searchable (not just index 0). A Service with two
    named ports (http-frontend at index 0, grpc-backend at index 1) is indexed via
    .spec.ports[*].name and both port names must be findable via ResourceSearchQuery.

  namespace: default

  steps:
    # =========================================================================
    # Pre-cleanup: remove any conflicting policies and leftover test resources
    # so the test is idempotent.
    # =========================================================================
    - name: pre-cleanup
      description: "Removes conflicting policies and stale test resources"
      try:
        - script:
            timeout: 30s
            content: |
              kubectl delete resourceindexpolicy \
                e2e-wildcard-policy \
                --ignore-not-found=true || true
              kubectl delete service \
                e2e-wildcard-svc \
                --ignore-not-found=true || true
              sleep 5
            check:
              ($error): ~

    # =========================================================================
    # Step 1: Create Service with two named ports
    # =========================================================================
    - name: create-service
      description: "Creates a Service with two named ports for wildcard indexing"
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: e2e-wildcard-svc
                namespace: default
                labels:
                  app: wildcard
              spec:
                type: ClusterIP
                selector:
                  app: wildcard
                ports:
                  - name: http-frontend
                    port: 80
                    targetPort: 8080
                    protocol: TCP
                  - name: grpc-backend
                    port: 9090
                    targetPort: 9090
                    protocol: TCP

    # =========================================================================
    # Step 2: Create ResourceIndexPolicy with [*] wildcard path
    # =========================================================================
    - name: create-policy
      description: "Creates ResourceIndexPolicy with .spec.ports[*].name to index all port names"
      try:
        - apply:
            resource:
              apiVersion: search.miloapis.com/v1alpha1
              kind: ResourceIndexPolicy
              metadata:
                name: e2e-wildcard-policy
              spec:
                targetResource:
                  group: ""
                  version: v1
                  kind: Service
                conditions:
                  - name: is-wildcard
                    expression: "metadata.labels['app'] == 'wildcard'"
                fields:
                  - path: ".metadata.name"
                    searchable: true
                  - path: ".spec.ports[*].name"
                    searchable: true

    # =========================================================================
    # Step 3: Wait for policy to reach Ready=True
    # =========================================================================
    - name: wait-for-policy-ready
      description: "Waits for the policy to finish reconciling"
      try:
        - wait:
            apiVersion: search.miloapis.com/v1alpha1
            kind: ResourceIndexPolicy
            name: e2e-wildcard-policy
            timeout: 60s
            for:
              condition:
                name: Ready
                value: "True"

    # =========================================================================
    # Step 4: Wait for the indexer to process audit events via NATS
    # =========================================================================
    - name: wait-for-indexing
      description: "Sleeps 15 seconds for the indexer to process audit events via NATS"
      try:
        - script:
            timeout: 20s
            content: sleep 15
            check:
              ($error): ~

    # =========================================================================
    # Step 5: Assert second-port name is findable (core anti-regression)
    # =========================================================================
    - name: search-second-port-grpc-backend
      description: "Finds e2e-wildcard-svc by grpc-backend (index 1 — only reachable via [*])"
      try:
        - script:
            timeout: 30s
            content: |
              RESULT=$(cat <<EOF | kubectl create -f - -o json
              apiVersion: search.miloapis.com/v1alpha1
              kind: ResourceSearchQuery
              metadata:
                name: search-grpc-backend
              spec:
                targetResources:
                  - group: ""
                    version: v1
                    kind: Service
                query: "grpc-backend"
                limit: 10
              EOF
              )
              echo "$RESULT" | jq -e '[.status.results[]? | select(.resource.metadata.name == "e2e-wildcard-svc")] | length > 0'
            check:
              ($error): ~

    # =========================================================================
    # Step 6: Assert first-port name is findable (sanity check)
    # =========================================================================
    - name: search-first-port-http-frontend
      description: "Finds e2e-wildcard-svc by http-frontend (index 0 — sanity check)"
      try:
        - script:
            timeout: 30s
            content: |
              RESULT=$(cat <<EOF | kubectl create -f - -o json
              apiVersion: search.miloapis.com/v1alpha1
              kind: ResourceSearchQuery
              metadata:
                name: search-http-frontend
              spec:
                targetResources:
                  - group: ""
                    version: v1
                    kind: Service
                query: "http-frontend"
                limit: 10
              EOF
              )
              echo "$RESULT" | jq -e '[.status.results[]? | select(.resource.metadata.name == "e2e-wildcard-svc")] | length > 0'
            check:
              ($error): ~

    # =========================================================================
    # Cleanup
    # =========================================================================
    - name: cleanup
      description: "Removes resources created by this test"
      try:
        - script:
            timeout: 30s
            content: |
              kubectl delete resourceindexpolicy e2e-wildcard-policy --ignore-not-found=true || true
              kubectl delete service e2e-wildcard-svc --ignore-not-found=true || true
            check:
              ($error): ~

    # =========================================================================
    # Final cleanup (belt-and-suspenders in case a mid-test failure left
    # resources behind before the cleanup step ran)
    # =========================================================================
    - name: final-cleanup
      description: "Belt-and-suspenders removal of any remaining test resources"
      try:
        - script:
            timeout: 30s
            content: |
              kubectl delete resourceindexpolicy \
                e2e-wildcard-policy \
                --ignore-not-found=true || true
              kubectl delete service \
                e2e-wildcard-svc \
                --ignore-not-found=true || true
            check:
              ($error): ~
