apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-indexer
  labels:
    app.kubernetes.io/name: resource-indexer
    app.kubernetes.io/component: indexer
    app.kubernetes.io/part-of: search
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: resource-indexer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: resource-indexer
    spec:
      containers:
      - name: indexer
        image: ghcr.io/datum-cloud/search
        command:
        - /search
        - indexer
        args:
        - --nats-url=$(NATS_URL)
        - --nats-tls-ca=$(NATS_TLS_CA)
        - --nats-tls-cert=$(NATS_TLS_CERT)
        - --nats-tls-key=$(NATS_TLS_KEY)
        - --meilisearch-domain=$(MEILISEARCH_DOMAIN)
        env:
        - name: NATS_URL
          value: "nats://nats.nats-system.svc.cluster.local:4222"
        - name: NATS_TLS_CA
          value: ""
        - name: NATS_TLS_CERT
          value: ""
        - name: NATS_TLS_KEY
          value: ""
        - name: NATS_Subject
          value: "audit.>"
        - name: NATS_QUEUE_GROUP
          value: "search-indexer"
        - name: NATS_DURABLE_NAME
          value: "search-indexer"
        - name: NATS_STREAM_NAME
          value: "AUDIT_EVENTS"
        - name: MEILISEARCH_DOMAIN
          value: "http://meilisearch.meilisearch-system.svc.cluster.local:7700"
        - name: MEILISEARCH_API_KEY
          valueFrom:
            secretKeyRef:
              name: meilisearch-master-key
              key: MEILI_MASTER_KEY

