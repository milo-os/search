apiVersion: v1
kind: Service
metadata:
  name: test-service-3
  namespace: default
  labels:
    app: search-demo
    environment: dev
spec:
  type: ClusterIP
  selector:
    app: backend-api
    component: core
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
