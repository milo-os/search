apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: search-system

resources:
  - ../../base/apiserver
  # Controller manager with RBAC
  - ../controller-manager/core-control-plane
  # Resource indexer with RBAC
  - ../resource-indexer/core-control-plane

# Include components for CI environment
components:
  - ../../components/namespace
  - ../../components/api-registration
  - ../../components/cert-manager-ca
  # Observability excluded for CI as Prometheus CRDs are not present
  # - ../../components/observability
  - ../../components/tracing
  - ../../components/vector-sidecar
  - ../../components/nats-config


# Override image tag for dev builds
images:
  - name: ghcr.io/milo-os/search
    newTag: dev

patches:
  - path: patches/vector-sidecar-patch.yaml
  # In kind, images are loaded directly via `kind load` — there is no registry
  # to pull from. Setting imagePullPolicy: Never ensures the kubelet always uses
  # the image that was loaded, and never falls back to a stale cached layer.
  - target:
      kind: Deployment
      name: search-apiserver
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      kind: Deployment
      name: search-controller-manager
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      kind: Deployment
      name: resource-indexer
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      kind: APIService
      name: v1alpha1.search.miloapis.com
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          cert-manager.io/inject-ca-from: search-system/search-ca
  - target:
      kind: APIService
      name: v1alpha1.search.miloapis.com
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          cert-manager.io/inject-ca-from: search-system/search-ca
  # Disable PodMonitor in Vector sidecar as Prometheus CRDs are not present
  - target:
      kind: HelmRelease
      name: vector-sidecar
      namespace: search-system
    patch: |-
      - op: replace
        path: /spec/values/podMonitor/enabled
        value: false

secretGenerator:
- name: meilisearch-master-key
  literals:
  - MEILI_MASTER_KEY=search-master-key

