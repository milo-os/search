apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: search-system

resources:
  - ../../base
  # Controller manager with RBAC
  - ../../controller-manager/overlays/core-control-plane

# Include components for development environment
components:
  - ../../components/namespace
  - ../../components/api-registration
  - ../../components/cert-manager-ca
  - ../../components/observability
  - ../../components/tracing
  - ../../components/vector-sidecar
  - ../../components/indexer

# Override image tag for dev builds
images:
  - name: ghcr.io/datum-cloud/search
    newTag: dev

patches:
  - target:
      kind: APIService
      name: v1alpha1.search.miloapis.com
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          cert-manager.io/inject-ca-from: search-system/search-ca
  - target:
      kind: APIService
      name: v1alpha1.search.miloapis.com
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          cert-manager.io/inject-ca-from: search-system/search-ca
  - target:
      kind: Deployment
      name: search-apiserver
      namespace: search-system
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--audit-log-path=-"
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--audit-policy-file=/etc/kubernetes/audit-policy.yaml"
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--audit-webhook-config-file=/etc/kubernetes/audit-webhook.yaml"
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: audit-config
          mountPath: /etc/kubernetes
          readOnly: true
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: audit-config
          configMap:
            name: audit-config

secretGenerator:
- name: search-controller-manager
  literals:
  - MEILISEARCH_API_KEY=search-master-key

